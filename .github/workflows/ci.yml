name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [20.x, 22.x]

        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run type checking
              run: npm run type-check

            - name: Run linting
              run: npm run lint
              continue-on-error: true

            - name: Run tests
              run: npm run test:coverage

            - name: Build project
              run: npm run build

            - name: Test CLI functionality (legacy bin name retained for compatibility)
              run: |
                  # Test basic CLI functionality
                  node dist/bin/eslint-chunker.js --help

                  # Test NPX aliases work (using node directly since npx isn't available in CI without publish)
                  node dist/bin/eslint-chunker.js --version

            - name: Upload coverage reports
              if: matrix.node-version == '20.x'
              uses: codecov/codecov-action@v5
              with:
                  files: ./coverage/lcov.info
                  token: ${{ secrets.CODECOV_TOKEN }}
                  fail_ci_if_error: false
